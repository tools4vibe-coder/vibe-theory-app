<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Theory — QR Presentation</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .qr-container {
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 32px;
      padding: 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease;
    }
    .qr-container:hover {
      transform: scale(1.01);
    }
    .logo-container {
      margin-bottom: 24px;
    }
    .logo-container img {
      height: 48px;
      object-fit: contain;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #4f46e5 0%, #db2777 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .sub {
      font-size: 15px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 32px;
      max-width: 380px;
    }
    .qr-frame {
      width: 280px;
      height: 280px;
      background: #ffffff;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }
    .qr-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .url-badge {
      font-family: monospace;
      font-size: 13px;
      font-weight: 600;
      color: #0284c7;
      background: rgba(2, 132, 199, 0.06);
      padding: 10px 20px;
      border-radius: 12px;
      word-break: break-all;
      width: 100%;
      margin-bottom: 32px;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #334155;
      background: rgba(255, 255, 255, 0.6);
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(15, 23, 42, 0.04);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { transform: scale(1.1); opacity: 0.7; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
    }
  </style>
</head>
<body>

  <div class="qr-container">
    <div class="logo-container">
      <img src="assets/logo.png" alt="Vibe Theory">
    </div>
    <h1>Join the AI Workshop</h1>
    <p class="sub">Scan this QR code with your phone camera to write prompts, upload photos, and generate videos.</p>
    
    <div class="qr-frame" id="qrFrame">
      <div style="color: #64748b; font-size: 14px;">Loading QR Code...</div>
    </div>
    
    <div class="url-badge" id="urlBadge">Loading URL...</div>
    
    <div class="status-badge">
      <span class="status-dot"></span>
      <span id="creatorCount">0 Connected Creators</span>
    </div>
  </div>

  <script>
    // Build URL dynamically
    const connectUrl = window.location.origin.includes('localhost') 
      ? 'https://vibetheory-app.vercel.app/connect.html' 
      : window.location.origin + '/connect.html';

    // Set QR Code
    document.getElementById('qrFrame').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(connectUrl)}" alt="Presentation QR Code">`;
    document.getElementById('urlBadge').textContent = connectUrl;

    // Poll active creators
    async function updateStats() {
      try {
        const res = await fetch('/api/state?action=users&t=' + Date.now());
        if (!res.ok) return;
        const data = await res.json();
        const usersCount = Object.keys(data.users || {}).length;
        document.getElementById('creatorCount').textContent = usersCount + (usersCount === 1 ? ' Connected Creator' : ' Connected Creators');
      } catch (e) {
        console.warn("Stats fetch failed:", e);
      }
    }
    
    setInterval(updateStats, 3000);
    updateStats();
  </script>

</body>
</html>
