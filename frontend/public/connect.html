<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>Vibe Theory — Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #FFFFFF;
      --surface: #f1f5f9;
      --surface-2: #e2e8f0;
      --border: #cbd5e1;
      --text: #1e293b;
      --dim: #64748b;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Name Entry Gate --- */
    .name-gate {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.5s, transform 0.5s;
    }
    .name-gate.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }
    .name-card {
      text-align: center;
      padding: 0 28px;
      width: 100%;
      max-width: 360px;
    }
    .name-card .name-sub {
      font-size: 13px;
      color: var(--dim);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .name-input {
      width: 100%;
      padding: 16px 18px;
      font-size: 17px;
      font-family: inherit;
      font-weight: 600;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      outline: none;
      margin-bottom: 14px;
      text-align: center;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .name-input:focus { border-color: var(--accent); }
    .name-input::placeholder { color: #475569; font-weight: 400; }
    .name-submit {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.15s;
      -webkit-appearance: none;
    }
    .name-submit:active { transform: scale(0.96); }

    /* --- Header --- */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .app-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .app-user {
      font-size: 11px;
      color: var(--dim);
      padding: 3px 8px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .gen-counter {
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      padding: 4px 10px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .gen-counter.depleted {
      color: var(--red);
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.2);
    }

    /* --- Chat Layout --- */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 49px);
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px 80px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-welcome {
      text-align: center;
      padding: 32px 16px;
      color: var(--dim);
      font-size: 13px;
      line-height: 1.6;
    }
    .chat-welcome-emoji { font-size: 36px; margin-bottom: 8px; }
    .chat-welcome h2 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    /* Chat Bubbles */
    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.user .chat-images {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .chat-msg.user .chat-images img {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .chat-msg.model {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .chat-msg.model .chat-sender {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    /* Storyboard Output */
    .storyboard-result {
      align-self: flex-start;
      max-width: 92%;
      padding: 0;
    }
    .storyboard-result img {
      width: 100%;
      border-radius: 12px;
      cursor: zoom-in;
    }
    .storyboard-result .sb-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }

    /* Typing indicator */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--dim);
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 23, 42, 0.95);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.55);
    }

    /* --- Chat Bar (fixed bottom) --- */
    .chat-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 60;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 8px 10px calc(8px + var(--safe-bottom));
    }
    .chat-bar-inner {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .chat-attach-btn {
      width: 38px; height: 38px;
      border: none;
      background: var(--surface);
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .chat-attach-btn:active { background: var(--surface-2); }
    .chat-input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .chat-input-wrap:focus-within { border-color: var(--accent); }
    .chat-file-preview {
      display: flex;
      gap: 6px;
      padding: 6px 8px 0;
      flex-wrap: wrap;
    }
    .chat-file-item {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
    }
    .chat-file-thumb {
      width: 44px; height: 44px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .chat-file-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .chat-file-thumb button {
      position: absolute; top: -3px; right: -3px;
      width: 16px; height: 16px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-file-tag {
      width: 44px;
      font-size: 8px;
      padding: 2px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      font-family: inherit;
      background: white;
    }
    .chat-input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      border: none;
      background: transparent;
      color: var(--text);
      outline: none;
      resize: none;
      line-height: 1.4;
      min-height: 48px;
      max-height: 120px;
      -webkit-appearance: none;
    }
    .chat-input::placeholder { color: #94a3b8; }
    .chat-send-btn {
      height: 38px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s;
      -webkit-appearance: none;
    }
    .chat-send-btn:active { transform: scale(0.94); }
    .chat-send-btn:disabled { opacity: 0.4; pointer-events: none; }

    /* Generate Video Button */
    .gen-video-btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-appearance: none;
    }
    .gen-video-btn:active { transform: scale(0.96); }
    .gen-video-btn:disabled { opacity: 0.45; pointer-events: none; }

    /* Video result in chat */
    .video-result {
      align-self: flex-start;
      max-width: 92%;
      width: 100%;
    }
    .video-result .vr-label {
      font-size: 10px;
      font-weight: 700;
      color: #f59e0b;
      margin-bottom: 6px;
    }
    .video-result video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }
    .video-result .vr-download {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
    }

    /* Video progress */
    .video-progress {
      align-self: flex-start;
      max-width: 92%;
      width: 100%;
      padding: 16px;
      background: var(--surface);
      border-radius: 14px;
    }
    .video-progress .vp-status {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .video-progress .vp-bar {
      height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .video-progress .vp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ec4899);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Limit banner */
    .c-limit-banner {
      padding: 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px;
      text-align: center;
      color: var(--red);
      font-size: 13px;
      font-weight: 600;
    }

    /* Footer */
    .c-footer {
      text-align: center;
      padding: 12px 0;
      font-size: 10px;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    /* Loading shimmer */
    .c-loading {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #ec4899, var(--accent));
      background-size: 200%;
      border-radius: 2px;
      animation: c-shimmer 1.5s ease infinite;
    }
    @keyframes c-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>

  <!-- Name Entry Gate -->
  <div class="name-gate" id="nameGate">
    <div class="name-card">
      <div style="margin-bottom: 24px;">
        <img src="assets/logo.png" alt="Vibe Theory" style="height: 60px; max-width: 100%; object-fit: contain; display: block; margin: 0 auto;">
      </div>
      <p class="name-sub">Welcome to the AI Storyboard Workshop!<br>Enter your name to start creating.</p>
      <input class="name-input" id="nameInput" type="text" placeholder="Your name" maxlength="30" autocomplete="off" autocapitalize="words">
      <button class="name-submit" id="nameSubmit" onclick="enterApp()">Let's Go →</button>
    </div>
  </div>

  <!-- App Header -->
  <div class="app-header">
    <div class="app-header-left">
      <img src="assets/logo.png" alt="Vibe Theory" style="height: 24px; display: block; object-fit: contain;">
      <div class="app-user" id="appUser"></div>
    </div>
    <div class="gen-counter" id="genCounter">3/3 left</div>
  </div>

  <!-- Chat Shell -->
  <div class="app-shell">
    <div class="chat-area" id="chatArea">
      <div class="chat-welcome">
        <div class="chat-welcome-emoji">🎬</div>
        <h2>Your AI Storyboard Director</h2>
        <p>Tell me your video idea and upload reference photos. I'll create a visual storyboard for you.</p>
      </div>
    </div>
  </div>

  <!-- Fixed Chat Bar -->
  <div class="chat-bar">
    <div class="chat-bar-inner">
      <button class="chat-attach-btn" onclick="document.getElementById('chatFileInput').click()" title="Upload photos">📎</button>
      <button class="chat-attach-btn" onclick="document.getElementById('chatCameraInput').click()" title="Take photo">📷</button>
      <input type="file" id="chatFileInput" multiple accept="image/*" style="display:none;" onchange="handleChatFiles(this.files)">
      <input type="file" id="chatCameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleChatFiles(this.files)">
      <div class="chat-input-wrap">
        <div class="chat-file-preview" id="chatFilePreview" style="display:none;"></div>
        <textarea class="chat-input" id="chatInput" rows="2" placeholder="Describe your video idea..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';"></textarea>
      </div>
      <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">Send</button>
    </div>
    <div id="cLimitBanner" style="display:none;margin-top:8px;" class="c-limit-banner">
      🚫 You've used all 3 storyboards. Thank you for participating!
    </div>
  </div>

<script>
  let API_KEY = '';
  const IMAGE_MODEL = 'gemini-3.1-flash-image';
  let VIDEO_MODEL = 'veo-3.1-fast-generate-preview';
  const SYNTH_MODEL = 'gemini-3.5-flash';
  const MAX_GENERATIONS = 3;
  let lastStoryboardData = null; // { b64, userPrompt, refImages }
  const STATE_API = '/api/state';
  let lastSubjectProfile = ''; // cached identity profile from fidelity pipeline

  // =====================================================================
  // NEBULA PRODUCT FIDELITY PIPELINE (5 Components)
  // =====================================================================

  // Helper: call Gemini text API for fidelity analysis
  async function callGeminiForFidelity(systemInstr, contentParts, jsonMode) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
    const body = {
      contents: [{ parts: contentParts }],
      systemInstruction: { parts: [{ text: systemInstr }] },
    };
    if (jsonMode) body.generationConfig = { responseMimeType: 'application/json' };
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  // Component 1: Smart Reference Selection — reorder images by prompt relevance
  async function selectBestSubjectImages(prompt, images) {
    if (images.length <= 1) return images;
    try {
      const parts = [];
      images.forEach((img, idx) => {
        parts.push({ text: `Image ${idx}:` });
        parts.push({ inlineData: { mimeType: img.mimeType || 'image/jpeg', data: img.base64 } });
      });
      parts.push({ text: `You are given ${images.length} product/character images.\nUser prompt: "${prompt}"\nIdentify which image index (or indices) are MOST RELEVANT as a visual reference.\nReturn at most 3 indices, ordered best-first.\nReturn ONLY strict JSON: { "selected": [0, 2, 1] }` });
      const result = await callGeminiForFidelity('You are a visual reference selector.', parts, true);
      const parsed = JSON.parse(result.trim());
      const sel = Array.isArray(parsed?.selected) ? parsed.selected : [];
      if (sel.length > 0) {
        const picked = sel.map(i => images[i]).filter(Boolean);
        const rest = images.filter((_, i) => !sel.includes(i));
        return [...picked, ...rest];
      }
    } catch (e) { console.warn('[selectBest] fallback:', e); }
    return images;
  }

  // Component 2: Multi-View Identity Prompt — extract stable identity text from references
  async function extractMultiViewReferencePrompt(images) {
    if (images.length <= 1) return '';
    try {
      const parts = images.map(img => ({ inlineData: { mimeType: img.mimeType || 'image/jpeg', data: img.base64 } }));
      parts.push({ text: `These images show the same subject/product from different angles.\nExtract the stable, reusable visual truth:\n- silhouette and proportions\n- materials and texture\n- seams, closures, straps, hardware\n- branding placement and recurring markers\n- color relationships\n- what changes vs what stays fixed\n\nReturn strict JSON:\n{ "summary": "compact multi-view reference summary", "constraints": ["rule1", "rule2"] }` });
      const result = await callGeminiForFidelity('You summarize multi-angle reference images into one identity-preservation pack.', parts, true);
      const parsed = JSON.parse(result.trim()) || {};
      const summary = String(parsed.summary || '').trim();
      const constraints = Array.isArray(parsed.constraints) ? parsed.constraints : [];
      return [summary, ...constraints.map(c => `- ${c}`)].filter(Boolean).join('\n').trim();
    } catch (e) { console.warn('[extractMultiView] failed:', e); return ''; }
  }

  // Component 3: Contact Sheet — stitch references into one image
  async function buildReferenceContactSheet(images, label = 'SUBJECT REFERENCE PACK') {
    if (images.length <= 1) return null;
    const tile = 420, labelH = 34, gap = 12;
    const cols = Math.min(4, Math.ceil(Math.sqrt(images.length)));
    const rows = Math.ceil(images.length / cols);
    const w = cols * tile + (cols + 1) * gap;
    const h = rows * (tile + labelH) + (rows + 1) * gap + 46;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    if (!ctx) return null;
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#111827'; ctx.font = 'bold 22px sans-serif';
    ctx.fillText(label, gap, 30);
    await Promise.all(images.map((imgObj, idx) => new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const col = idx % cols, row = Math.floor(idx / cols);
        const x = gap + col * (tile + gap), y = 46 + gap + row * (tile + labelH + gap);
        ctx.fillStyle = '#f8fafc'; ctx.fillRect(x, y, tile, tile);
        const scale = Math.min(tile / img.width, tile / img.height);
        const dw = img.width * scale, dh = img.height * scale;
        ctx.drawImage(img, x + (tile - dw) / 2, y + (tile - dh) / 2, dw, dh);
        ctx.fillStyle = '#111827'; ctx.font = '18px sans-serif';
        ctx.fillText(`View ${idx + 1}`, x + 10, y + tile + 24);
        resolve();
      };
      img.onerror = () => resolve();
      img.src = `data:${imgObj.mimeType || 'image/jpeg'};base64,${imgObj.base64}`;
    })));
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    return dataUrl.split(',')[1]; // return just base64
  }

  function buildAntiHallucinationPromptSuffix(prompt, strictReferenceLock, attemptCorrection) {
    if (!strictReferenceLock) return prompt;
    const suffix = `
REFERENCE LOCK (MANDATORY):
- Use connected reference image(s) as hard ground truth.
- Do not invent, add, remove, or morph key objects/identity/logo/text.
- Keep object geometry, proportions, materials, and colors consistent with references.
- Preserve key object count and placement logic from references unless explicitly requested otherwise.
- If uncertain, stay close to the reference instead of creative invention.
${attemptCorrection ? `\nCORRECTION: ${attemptCorrection}` : ''}
`;
    return `${prompt}\n${suffix}`.trim();
  }

  // Component 4: Constraint Header Injection — prepend identity lock to prompt
  function applySubjectProfilePriority(prompt, profileText, imageCount) {
    if (imageCount <= 0) return prompt;
    const lock = [
      `⚠️ SUBJECT IDENTITY LOCK (HIGHEST PRIORITY):`,
      `The image(s) provided are the ACTUAL SUBJECT. You are NOT creating a new design.`,
      `REPRODUCE the exact subject shown in the reference:`,
      `  • Same silhouette, shape, proportions — do NOT redesign`,
      `  • Same color blocking and palette — no substitutions`,
      `  • Same materials, textures, stitching, hardware`,
      `  • Same branding, logos, labels — exact placement`,
      `  • Same construction details, seams, pockets, straps`,
      `Do NOT invent a generic replacement. Do NOT simplify.`,
      profileText ? `Confirmed identity profile: ${profileText}` : '',
      ``,
      `SCENE / TREATMENT INSTRUCTION (apply to the above subject):`,
    ].filter(Boolean).join('\n');
    return [lock, prompt].join('\n').trim();
  }

  // Component 5: Grounding Assessor — validate generated image against references
  async function assessImageGrounding(prompt, refImages, generatedB64, minScore = 75) {
    if (!refImages.length) return { pass: true, score: 100, issues: '', correction: '', failureType: 'none' };
    try {
      const parts = [];
      refImages.forEach((img, idx) => {
        parts.push({ text: `Reference ${idx + 1}:` });
        parts.push({ inlineData: { mimeType: img.mimeType || 'image/jpeg', data: img.base64 } });
      });
      parts.push({ text: 'Generated output:' });
      parts.push({ inlineData: { mimeType: 'image/png', data: generatedB64 } });
      parts.push({ text: `Evaluate whether the generated image faithfully reproduces the subject from the references.\nUser prompt: "${prompt}"\nFail if the output invents, removes, or changes visible details such as silhouette, geometry, materials, seams, hardware, pockets, straps, closures, logo placement, color blocking, face identity, or construction logic.\nReturn strict JSON:\n{ "grounding_score": 0-100, "hallucination_detected": boolean, "failure_type": "composition"|"product"|"mixed"|"other"|"none", "issues": "short description", "correction": "single actionable correction sentence" }` });
      const result = await callGeminiForFidelity('You are an AI image quality and product grounding assessor.', parts, true);
      const data = JSON.parse(result.trim());
      const score = Math.max(0, Math.min(100, Number(data.grounding_score || 0)));
      const pass = !data.hallucination_detected && score >= minScore;
      return { pass, score, issues: String(data.issues || ''), correction: String(data.correction || ''), failureType: data.failure_type || 'other' };
    } catch (e) { console.warn('[assessGrounding] failed, defaulting pass:', e); return { pass: true, score: 100, issues: '', correction: '', failureType: 'none' }; }
  }

  // --- Generate Visual Storyboard (with Nebula Fidelity Pipeline) ---
  async function generateStoryboard(userPrompt, refImages) {

      // Step 3: Build Contact Sheet

      if (allRefImages.length > 1) {
        pipelineStatus = '📋 Building reference contact sheet...';
        chatHistory.find(m => m.text?.includes('Extracting') || m.text?.includes('Building'))
          && (chatHistory.find(m => m.text?.includes('Extracting') || m.text?.includes('Building')).text = pipelineStatus);
        renderChatArea();
        contactSheetB64 = await buildReferenceContactSheet(allRefImages);
      }

      // Update status to generating
      const statusMsg = chatHistory.find(m => m.text?.includes('Building') || m.text?.includes('Creating'));
      if (statusMsg) statusMsg.text = '🎨 Generating storyboard...';
      renderChatArea();

      // Build image parts for the API call
      const imgParts = [];
      // Add contact sheet first if available (single combined reference)
      if (contactSheetB64) {
        imgParts.push({ inlineData: { mimeType: 'image/jpeg', data: contactSheetB64 } });
      }
      // Then individual images
      for (const img of allRefImages) {
        imgParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
      }

      // Build tag context
      const allImages = chatHistory.filter(m => m.role === 'user' && m.images).flatMap(m => m.images);
      let tagContext = '';
      if (allImages.length > 0) {
        tagContext = `\nVISUAL REFERENCE IMAGES PROVIDED:\n${allImages.map((img, i) => `- Image [${i+1}] tag: "${img.tag}"`).join('\n')}`;
      }

      // Detect stylized art style
      const allText = chatHistory.filter(m => m.role === 'user').map(m => m.text).join(' ');
      const stylizedKeywords = /\b(anime|sketch|cartoon|comic|manga|illustration|watercolor|pixel\s*art|cel[\s-]?shad|line\s*art|chibi|hand[\s-]?drawn|pencil|ink|paint|2d\s*animation)\b/i;
      const isStylized = stylizedKeywords.test(allText);
      const styleDirective = isStylized
        ? `Use the art style explicitly requested (e.g. anime, sketch, cartoon, etc.) for all panels and character designs.`
        : `MANDATORY VISUAL STYLE: Ultra-realistic, photorealistic, 4K cinematic quality. Every panel must look like a real photograph or high-end film still — NOT a sketch, NOT a cartoon, NOT an illustration.`;

      // Sanitize prompt for image model
      function sanitizeForImageGen(text) {
        const replacements = [
          [/\bhulk\b/gi, 'a massive green muscular superhero'],
          [/\bspider[\s-]?man\b/gi, 'a masked web-slinging superhero'],
          [/\bbatman\b/gi, 'a dark caped vigilante hero'],
          [/\bsuperman\b/gi, 'a powerful flying caped hero'],
          [/\biron[\s-]?man\b/gi, 'a hero in high-tech red and gold armor'],
          [/\bthor\b/gi, 'a powerful lightning god warrior'],
          [/\bcaptain america\b/gi, 'a shield-wielding patriot hero'],
          [/\bthanos\b/gi, 'a powerful cosmic titan villain'],
          [/\bjoker\b/gi, 'a sinister clown villain'],
          [/\bfighting\b/gi, 'having an epic encounter with'],
          [/\bfight\b/gi, 'epic encounter'],
          [/\battack\b/gi, 'dramatic confrontation'],
          [/\bkill\b/gi, 'defeat'],
          [/\bpunch\b/gi, 'powerful gesture toward'],
        ];
        let result = text;
        for (const [pattern, replacement] of replacements) {
          result = result.replace(pattern, replacement);
        }
        return result;
      }

      const cleanPrompt = sanitizeForImageGen(userPrompt);

      // Step 4: Apply Subject Profile Priority (identity lock header)
      let finalPrompt = cleanPrompt;
      if (allRefImages.length > 0) {
        finalPrompt = applySubjectProfilePriority(cleanPrompt, subjectProfile, allRefImages.length);
      }

      const storyboardPrompt = `Generate a comprehensive visual board and storyboard sheet in 16:9 ratio for this video concept:

"${finalPrompt}"
${tagContext}

${styleDirective}

The sheet must be styled like a professional production concept art sheet containing:
1. Character Design & Expressions: Model sheets showing the character's face, body, and expressions in different angles — rendered in ${isStylized ? 'the requested art style' : 'ultra-realistic, photorealistic detail (like a real photo)'}.
2. Color Palette & Environment: Swatches and key background landscapes defining the setting — ${isStylized ? 'in the requested style' : 'photorealistic, cinematic, 4K quality'}.
3. Sequential Storyboard Panels: A grid of multiple storyboard frames (minimum 6, labeled Shot 01, Shot 02, etc.) that tell the narrative progression — each panel must be ${isStylized ? 'in the requested art style' : 'ultra-realistic and look like a real movie frame, NOT a drawn sketch'}.

CRITICAL REQUIREMENT: If reference images are provided, the character/product in the visual board must look IDENTICAL to the reference images.
Do NOT include any copyrighted characters, brand logos, or trademarked content.`;

      // Generate with retry (up to 2 attempts + 1 grounding retry)
      let imgB64 = null;
      let correctionHint = '';
      for (let attempt = 1; attempt <= 3; attempt++) {
        let promptForAttempt = storyboardPrompt;
        if (allRefImages.length > 0) {
          promptForAttempt = buildAntiHallucinationPromptSuffix(storyboardPrompt, true, (attempt === 3 && correctionHint) ? correctionHint : undefined);
        }
        if (attempt === 2) {
          // Simplified fallback prompt
          promptForAttempt = `Generate a creative visual storyboard sheet in 16:9 ratio with character designs and 6 sequential panels for this concept: "${cleanPrompt}". Use original character designs inspired by the description. ${isStylized ? '' : 'Ultra-realistic photorealistic style.'} Do NOT use any copyrighted characters or brand names.`;
        } else if (attempt === 3 && correctionHint) {
          if (statusMsg) statusMsg.text = '🔄 Refining storyboard for better fidelity...';
          renderChatArea();
        }

        const requestParts = [...imgParts, { text: promptForAttempt }];

        try {
          const fRes = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:generateContent?key=${API_KEY}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: requestParts }],
                generationConfig: {
                  responseModalities: ["TEXT", "IMAGE"],
                  temperature: 1.0,
                  imageConfig: {
                    imageSize: "2K",
                    aspectRatio: "16:9"
                  }
                }
              })
            }
          );
          const fData = await fRes.json();
          if (fData.error) {
            console.warn(`Storyboard attempt ${attempt} error:`, fData.error.message);
            if (attempt >= 2 && !correctionHint) throw new Error(fData.error.message);
            continue;
          }

          const resParts = fData.candidates?.[0]?.content?.parts || [];
          for (const p of resParts) {
            if (p.inlineData && p.inlineData.mimeType.startsWith('image/')) {
              imgB64 = p.inlineData.data;
              break;
            }
          }

          if (!imgB64) {
            if (attempt === 1) console.warn('Attempt 1 no image — retrying...');
            continue;
          }

          // Step 5: Grounding Validation (only on first successful generation with references)
          if (attempt <= 2 && allRefImages.length > 0 && !correctionHint) {
            if (statusMsg) statusMsg.text = '🔍 Validating fidelity...';
            renderChatArea();
            const assessment = await assessImageGrounding(userPrompt, allRefImages, imgB64);
            console.log(`[Grounding] Score: ${assessment.score}, Pass: ${assessment.pass}, Issues: ${assessment.issues}`);
            if (!assessment.pass && assessment.correction) {
              correctionHint = assessment.correction;
              console.warn(`[Grounding] Failed (${assessment.score}) — retrying with correction: ${correctionHint}`);
              imgB64 = null; // force retry
              continue;
            }
          }

          break; // success
        } catch (attemptErr) {
          console.warn(`Storyboard attempt ${attempt} failed:`, attemptErr);
          if (attempt === 3 || (attempt === 2 && !correctionHint)) throw attemptErr;
        }
      }

      if (!imgB64) throw new Error("No storyboard image returned after all attempts.");

      // Remove the status message
      chatHistory = chatHistory.filter(m => !m.text?.includes('Creating') && !m.text?.includes('Generating') && !m.text?.includes('Analyzing') && !m.text?.includes('Extracting') && !m.text?.includes('Building') && !m.text?.includes('Validating') && !m.text?.includes('Refining'));

      // Save storyboard data for video generation
      lastStoryboardData = { b64: imgB64, userPrompt, refImages: allRefImages };

      chatHistory.push({ role: 'model', storyboardB64: imgB64, text: '' });

    } catch (e) {
      chatHistory = chatHistory.filter(m => !m.text?.includes('Creating') && !m.text?.includes('Generating') && !m.text?.includes('Analyzing') && !m.text?.includes('Extracting') && !m.text?.includes('Building') && !m.text?.includes('Validating') && !m.text?.includes('Refining'));
      chatHistory.push({ role: 'model', text: `⚠️ Storyboard generation failed: ${e.message}. Try again!` });
    }

    isTyping = false;
    renderChatArea();
  }

  // --- Generate Video from Storyboard (Gemini Omni Flash — 20s = 2×10s) ---

  // Helper: extract base64 from Omni response
  function extractVideoB64(omniData) {
    let videoB64 = omniData.output_video?.data || null;
    const steps = omniData.steps || [];
    for (const step of steps) {
      if (step.content) {
        const contentList = Array.isArray(step.content) ? step.content : [step.content];
        for (const content of contentList) {
          const partsList = content.parts || [content];
          for (const part of partsList) {
            if (part.data) { videoB64 = part.data; break; }
            if (part.inlineData?.data) { videoB64 = part.inlineData.data; break; }
          }
          if (videoB64) break;
        }
      }
      if (videoB64) break;
    }
    return videoB64;
  }

  // Helper: extract last frame from video as base64 PNG
  function extractLastFrame(videoB64) {
    return new Promise((resolve, reject) => {
      const video = document.createElement('video');
      video.muted = true;
      video.playsInline = true;
      video.preload = 'auto';
      video.src = `data:video/mp4;base64,${videoB64}`;

      video.onloadedmetadata = () => {
        // Seek to near the end (last 0.1s)
        video.currentTime = Math.max(0, video.duration - 0.1);
      };

      video.onseeked = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0);
          const dataUrl = canvas.toDataURL('image/png');
          const b64 = dataUrl.split(',')[1];
          video.src = ''; // Release memory
          resolve(b64);
        } catch (e) {
          reject(e);
        }
      };

      video.onerror = () => reject(new Error('Failed to load video for frame extraction'));
      setTimeout(() => reject(new Error('Frame extraction timeout')), 15000);
    });
  }

  // Helper: call Omni Flash
  async function callOmniFlash(inputParts, duration = '10s') {
    const requestBody = {
      model: 'gemini-omni-flash-preview',
      input: inputParts,
      response_format: { type: 'video', aspect_ratio: '9:16', duration }
    };
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/interactions?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const b64 = extractVideoB64(data);
    if (!b64) throw new Error('No video returned from Omni Flash.');
    return b64;
  }

  async function startVideoGeneration() {
    if (!lastStoryboardData) return;
    const btn = document.getElementById('genVideoBtn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Starting...'; }

    const { b64: storyboardB64, userPrompt, refImages } = lastStoryboardData;

    // Mark storyboard as used
    for (const msg of chatHistory) {
      if (msg.storyboardB64 === storyboardB64) msg.videoGenerated = true;
    }

    const progressMsg = { role: 'model', videoProgress: '⏳ Step 1/4: AI Director planning 20s film...', progressPct: 10 };
    chatHistory.push(progressMsg);
    renderChatArea();

    try {
      // === Step 1: Synthesize TWO prompts (clip 1 = 0–10s, clip 2 = 10–20s) ===
      let promptClip1 = userPrompt;
      let promptClip2 = userPrompt;

      try {
        const synthParts = [];
        for (const img of refImages) {
          synthParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
        }
        synthParts.push({ inlineData: { mimeType: 'image/png', data: storyboardB64 } });
        synthParts.push({
          text: `You are an expert AI video director. We are generating a 20-second video in TWO sequential 10-second clips using Gemini Omni Flash.

INPUTS:
1. Reference photos (uploaded by user) — use for exact character appearance
2. Visual Board & Storyboard Sheet with character designs, expressions, and sequential panels

USER'S PROMPT: "${userPrompt}"

TASK: Analyze the storyboard panels and reference photos. Write TWO separate cinematic video prompts:

CLIP 1 (0–10s): Covers the FIRST HALF of the storyboard — the setup, opening shots, and initial action. Must end on a clear, holdable moment that the next clip can seamlessly continue from.

CLIP 2 (10–20s): Covers the SECOND HALF of the storyboard — the climax, resolution, and closing shots. Must begin exactly where Clip 1 ended, maintaining the same character positions, camera angle, lighting, and environment.

RULES:
- Each prompt is ONE continuous paragraph — no timestamps, no scene labels
- Maintain exact character identity from reference photos in both clips
- Describe camera movements, lens actions, lighting, action beats
- Do NOT include any text overlays, subtitles, watermarks
- The transition between clips must be seamless — same scene, same moment

Output EXACTLY in this format (no extra text):
CLIP1: [prompt text]
CLIP2: [prompt text]`
        });

        const synthRes = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${SYNTH_MODEL}:generateContent?key=${API_KEY}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: synthParts }] }) }
        );
        const synthData = await synthRes.json();
        const synthText = synthData.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';

        const clip1Match = synthText.match(/CLIP1:\s*([\s\S]*?)(?=CLIP2:|$)/i);
        const clip2Match = synthText.match(/CLIP2:\s*([\s\S]*?)$/i);
        if (clip1Match?.[1]?.trim()) promptClip1 = clip1Match[1].trim();
        if (clip2Match?.[1]?.trim()) promptClip2 = clip2Match[1].trim();
      } catch (synthErr) {
        console.warn('Synthesis failed, using original prompt for both clips:', synthErr);
      }

      const qualityGuard = ' Maintain temporal consistency. Zero erratic camera shaking. Anatomically correct humans. Smooth natural motion. Stable consistent face identity throughout. Cinematic motion blur, natural depth of field. Do NOT include any text overlays, subtitles, watermarks, or written words.';
      promptClip1 += qualityGuard;
      promptClip2 += qualityGuard;

      if (refImages.length > 0) {
        promptClip1 = applySubjectProfilePriority(promptClip1, lastSubjectProfile || '', refImages.length);
        promptClip2 = applySubjectProfilePriority(promptClip2, lastSubjectProfile || '', refImages.length);

        promptClip1 = buildAntiHallucinationPromptSuffix(promptClip1, true);
        promptClip2 = buildAntiHallucinationPromptSuffix(promptClip2, true);
      }

      // === Step 2: Generate Clip 1 (0–10s) ===
      progressMsg.videoProgress = '⏳ Step 2/4: Generating Clip 1 (0–10s)...';
      progressMsg.progressPct = 25;
      renderChatArea();

      let elapsed = 0;
      const interval1 = setInterval(() => {
        elapsed += 3;
        progressMsg.videoProgress = `⏳ Step 2/4: Clip 1 rendering... (${elapsed}s)`;
        progressMsg.progressPct = Math.min(45, 25 + (elapsed / 120) * 20);
        renderChatArea();
      }, 3000);

      const inputParts1 = [];
      for (const img of refImages) {
        inputParts1.push({ type: 'image', data: img.base64, mime_type: img.mimeType });
      }
      inputParts1.push({ type: 'image', data: storyboardB64, mime_type: 'image/png' });
      inputParts1.push({ type: 'text', text: promptClip1 });

      const clip1B64 = await callOmniFlash(inputParts1, '10s');
      clearInterval(interval1);

      // === Step 3: Extract last frame from Clip 1 ===
      progressMsg.videoProgress = '⏳ Step 3/4: Extracting continuity frame...';
      progressMsg.progressPct = 50;
      renderChatArea();

      let lastFrameB64;
      try {
        lastFrameB64 = await extractLastFrame(clip1B64);
      } catch (frameErr) {
        console.warn('Frame extraction failed:', frameErr);
        lastFrameB64 = null;
      }

      // === Step 4: Generate Clip 2 (10–20s) with last frame as first frame ===
      progressMsg.videoProgress = '⏳ Step 3/4: Generating Clip 2 (10–20s)...';
      progressMsg.progressPct = 55;
      renderChatArea();

      let elapsed2 = 0;
      const interval2 = setInterval(() => {
        elapsed2 += 3;
        progressMsg.videoProgress = `⏳ Step 3/4: Clip 2 rendering... (${elapsed2}s)`;
        progressMsg.progressPct = Math.min(75, 55 + (elapsed2 / 120) * 20);
        renderChatArea();
      }, 3000);

      const inputParts2 = [];
      // Add last frame as the FIRST reference so Omni starts from it
      if (lastFrameB64) {
        inputParts2.push({ type: 'image', data: lastFrameB64, mime_type: 'image/png' });
      }
      for (const img of refImages) {
        inputParts2.push({ type: 'image', data: img.base64, mime_type: img.mimeType });
      }
      inputParts2.push({ type: 'image', data: storyboardB64, mime_type: 'image/png' });

      const continuityPrefix = lastFrameB64
        ? 'CONTINUITY LOCK: The attached first image is the EXACT last frame of the previous clip. You MUST start this clip from this EXACT frame — same character positions, same camera angle, same lighting, same environment. Begin from this frozen moment and seamlessly continue the action. '
        : '';
      inputParts2.push({ type: 'text', text: continuityPrefix + promptClip2 });

      const clip2B64 = await callOmniFlash(inputParts2, '10s');
      clearInterval(interval2);

      // === Step 5: Package both clips for seamless playback ===
      progressMsg.videoProgress = '⏳ Step 4/4: Preparing your 20s film...';
      progressMsg.progressPct = 95;
      renderChatArea();

      const videoClip1 = `data:video/mp4;base64,${clip1B64}`;
      const videoClip2 = `data:video/mp4;base64,${clip2B64}`;

      // === Done — show seamless dual-clip player ===
      chatHistory = chatHistory.filter(m => m !== progressMsg);
      chatHistory.push({ role: 'model', videoClips: [videoClip1, videoClip2], text: '' });
      chatHistory.push({ role: 'model', text: '🎬 Your 20-second film is ready! Download it or send another idea.' });

      incrementGenCount();
      updateGenCounter();

      // Save to shared library
      try {
        await fetch(`${STATE_API}?action=video`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user: userName, prompt: userPrompt, uri: typeof videoSrc === 'string' && videoSrc.startsWith('http') ? videoSrc : null, aspectRatio: '9:16' })
        });
      } catch (e) {}

    } catch (e) {
      chatHistory = chatHistory.filter(m => m !== progressMsg);
      chatHistory.push({ role: 'model', text: `⚠️ Video generation failed: ${e.message}` });
    }

    lastStoryboardData = null;
    renderChatArea();
  }

  // Download helper
  window.downloadVideo = async function(src) {
    try {
      const res = await fetch(src);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `vibetheory-video-${Date.now()}.mp4`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch (e) {
      alert('Download failed: ' + e.message);
    }
  };

  window.downloadMergedClips = async function(clipId) {
    if (!window.generatedClipsCache) return;
    const clips = window.generatedClipsCache.get(clipId);
    if (!clips || clips.length === 0) return;
    const clip1 = clips[0];
    const clip2 = clips[1];
    
    try {
      console.log('Sending clips to merge-video endpoint...');
      const res = await fetch('/api/merge-video', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          clips: [
            { url: clip1, trimStart: 0, trimEnd: 10 },
            { url: clip2, trimStart: 0, trimEnd: 10 }
          ],
          aspectRatio: '9:16'
        })
      });
      if (res.ok) {
        let blob;
        const contentType = res.headers.get("Content-Type") || "";
        if (contentType.includes("application/json")) {
          const json = await res.json();
          if (json.url) {
            const blobRes = await fetch(json.url);
            blob = await blobRes.blob();
          } else {
            throw new Error(json.error || "Empty response");
          }
        } else {
          blob = await res.blob();
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `vibetheory-merged-${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } else {
        throw new Error(await res.text() || 'Merge service error');
      }
    } catch (e) {
      console.warn('Stitching service is busy or timed out, downloading individual clips:', e);
      alert('Stitching service timed out. Downloading Clip 1 and Clip 2 as separate files instead.');
      
      const a1 = document.createElement('a');
      a1.href = clip1;
      a1.download = `clip1-${Date.now()}.mp4`;
      document.body.appendChild(a1);
      a1.click();
      document.body.removeChild(a1);
      
      if (clip2) {
        setTimeout(() => {
          const a2 = document.createElement('a');
          a2.href = clip2;
          a2.download = `clip2-${Date.now()}.mp4`;
          document.body.appendChild(a2);
          a2.click();
          document.body.removeChild(a2);
        }, 1000);
      }
    }
  };

</script>
