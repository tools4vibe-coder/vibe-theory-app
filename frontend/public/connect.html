<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>Vibe Theory — Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #FFFFFF;
      --surface: #f1f5f9;
      --surface-2: #e2e8f0;
      --border: #cbd5e1;
      --text: #1e293b;
      --dim: #64748b;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Name Entry Gate --- */
    .name-gate {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.5s, transform 0.5s;
    }
    .name-gate.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }
    .name-card {
      text-align: center;
      padding: 0 28px;
      width: 100%;
      max-width: 360px;
    }
    .name-card .name-sub {
      font-size: 13px;
      color: var(--dim);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .name-input {
      width: 100%;
      padding: 16px 18px;
      font-size: 17px;
      font-family: inherit;
      font-weight: 600;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      outline: none;
      margin-bottom: 14px;
      text-align: center;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .name-input:focus { border-color: var(--accent); }
    .name-input::placeholder { color: #475569; font-weight: 400; }
    .name-submit {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.15s;
      -webkit-appearance: none;
    }
    .name-submit:active { transform: scale(0.96); }

    /* --- Header --- */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .app-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .app-user {
      font-size: 11px;
      color: var(--dim);
      padding: 3px 8px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .gen-counter {
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      padding: 4px 10px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .gen-counter.depleted {
      color: var(--red);
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.2);
    }

    /* --- Chat Layout --- */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 49px);
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px 80px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-welcome {
      text-align: center;
      padding: 32px 16px;
      color: var(--dim);
      font-size: 13px;
      line-height: 1.6;
    }
    .chat-welcome-emoji { font-size: 36px; margin-bottom: 8px; }
    .chat-welcome h2 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    /* Chat Bubbles */
    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.user .chat-images {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .chat-msg.user .chat-images img {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .chat-msg.model {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .chat-msg.model .chat-sender {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    /* Storyboard Output */
    .storyboard-result {
      align-self: flex-start;
      max-width: 92%;
      padding: 0;
    }
    .storyboard-result img {
      width: 100%;
      border-radius: 12px;
      cursor: zoom-in;
    }
    .storyboard-result .sb-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }

    /* Typing indicator */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--dim);
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 23, 42, 0.95);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.55);
    }

    /* --- Chat Bar (fixed bottom) --- */
    .chat-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 60;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 8px 10px calc(8px + var(--safe-bottom));
    }
    .chat-bar-inner {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .chat-attach-btn {
      width: 38px; height: 38px;
      border: none;
      background: var(--surface);
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .chat-attach-btn:active { background: var(--surface-2); }
    .chat-input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .chat-input-wrap:focus-within { border-color: var(--accent); }
    .chat-file-preview {
      display: flex;
      gap: 6px;
      padding: 6px 8px 0;
      flex-wrap: wrap;
    }
    .chat-file-item {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
    }
    .chat-file-thumb {
      width: 44px; height: 44px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .chat-file-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .chat-file-thumb button {
      position: absolute; top: -3px; right: -3px;
      width: 16px; height: 16px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-file-tag {
      width: 44px;
      font-size: 8px;
      padding: 2px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      font-family: inherit;
      background: white;
    }
    .chat-input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      border: none;
      background: transparent;
      color: var(--text);
      outline: none;
      resize: none;
      line-height: 1.4;
      min-height: 48px;
      max-height: 120px;
      -webkit-appearance: none;
    }
    .chat-input::placeholder { color: #94a3b8; }
    .chat-send-btn {
      height: 38px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s;
      -webkit-appearance: none;
    }
    .chat-send-btn:active { transform: scale(0.94); }
    .chat-send-btn:disabled { opacity: 0.4; pointer-events: none; }

    /* Generate Video Button */
    .gen-video-btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-appearance: none;
    }
    .gen-video-btn:active { transform: scale(0.96); }
    .gen-video-btn:disabled { opacity: 0.45; pointer-events: none; }

    /* Video result in chat */
    .video-result {
      align-self: flex-start;
      max-width: 92%;
      width: 100%;
    }
    .video-result .vr-label {
      font-size: 10px;
      font-weight: 700;
      color: #f59e0b;
      margin-bottom: 6px;
    }
    .video-result video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }
    .video-result .vr-download {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
    }

    /* Video progress */
    .video-progress {
      align-self: flex-start;
      max-width: 92%;
      width: 100%;
      padding: 16px;
      background: var(--surface);
      border-radius: 14px;
    }
    .video-progress .vp-status {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .video-progress .vp-bar {
      height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
    }
    .video-progress .vp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ec4899);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Limit banner */
    .c-limit-banner {
      padding: 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px;
      text-align: center;
      color: var(--red);
      font-size: 13px;
      font-weight: 600;
    }

    /* Footer */
    .c-footer {
      text-align: center;
      padding: 12px 0;
      font-size: 10px;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    /* Loading shimmer */
    .c-loading {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #ec4899, var(--accent));
      background-size: 200%;
      border-radius: 2px;
      animation: c-shimmer 1.5s ease infinite;
    }
    @keyframes c-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>
</head>
<body>

  <!-- Name Entry Gate -->
  <div class="name-gate" id="nameGate">
    <div class="name-card">
      <div style="margin-bottom: 24px;">
        <img src="assets/logo.png" alt="Vibe Theory" style="height: 60px; max-width: 100%; object-fit: contain; display: block; margin: 0 auto;">
      </div>
      <p class="name-sub">Welcome to the AI Storyboard Workshop!<br>Enter your name to start creating.</p>
      <input class="name-input" id="nameInput" type="text" placeholder="Your name" maxlength="30" autocomplete="off" autocapitalize="words">
      <button class="name-submit" id="nameSubmit" onclick="enterApp()">Let's Go →</button>
    </div>
  </div>

  <!-- App Header -->
  <div class="app-header">
    <div class="app-header-left">
      <img src="assets/logo.png" alt="Vibe Theory" style="height: 24px; display: block; object-fit: contain;">
      <div class="app-user" id="appUser"></div>
    </div>
    <div class="gen-counter" id="genCounter">3/3 left</div>
  </div>

  <!-- Chat Shell -->
  <div class="app-shell">
    <div class="chat-area" id="chatArea">
      <div class="chat-welcome">
        <div class="chat-welcome-emoji">🎬</div>
        <h2>Your AI Storyboard Director</h2>
        <p>Tell me your video idea and upload reference photos. I'll create a visual storyboard for you.</p>
      </div>
    </div>
  </div>

  <!-- Fixed Chat Bar -->
  <div class="chat-bar">
    <div class="chat-bar-inner">
      <button class="chat-attach-btn" onclick="document.getElementById('chatFileInput').click()" title="Upload photos">📎</button>
      <button class="chat-attach-btn" onclick="document.getElementById('chatCameraInput').click()" title="Take photo">📷</button>
      <input type="file" id="chatFileInput" multiple accept="image/*" style="display:none;" onchange="handleChatFiles(this.files)">
      <input type="file" id="chatCameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleChatFiles(this.files)">
      <div class="chat-input-wrap">
        <div class="chat-file-preview" id="chatFilePreview" style="display:none;"></div>
        <textarea class="chat-input" id="chatInput" rows="2" placeholder="Describe your video idea..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';"></textarea>
      </div>
      <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">Send</button>
    </div>
    <div id="cLimitBanner" style="display:none;margin-top:8px;" class="c-limit-banner">
      🚫 You've used all 3 storyboards. Thank you for participating!
    </div>
  </div>

<script>
  let API_KEY = '';
  const IMAGE_MODEL = 'gemini-3.1-flash-image';
  let VIDEO_MODEL = 'veo-3.1-fast-generate-preview';
  const SYNTH_MODEL = 'gemini-3.5-flash';
  const MAX_GENERATIONS = 3;
  let lastStoryboardData = null; // { b64, userPrompt, refImages }
  const STATE_API = '/api/state';

  let userName = '';
  let chatHistory = []; // { role: 'user'|'model', text, images?, storyboardB64? }
  let chatFiles = []; // { src, base64, mimeType, name, tag }
  let isTyping = false;

  // --- Name Gate ---
  async function enterApp() {
    const input = document.getElementById('nameInput');
    const name = input.value.trim();
    if (!name) { input.style.borderColor = '#ef4444'; input.focus(); return; }
    await configReady; // Ensure API key is loaded
    userName = name;
    sessionStorage.setItem('connect_user', name);
    document.getElementById('nameGate').classList.add('hidden');
    document.getElementById('appUser').textContent = name;
    try {
      const res = await fetch(`${STATE_API}?action=join`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name })
      });
    } catch (e) { console.warn('Failed to register:', e); }
    updateGenCounter();
    resetIdleTimer();
  }

  // --- Idle Timeout ---
  let idleTimer = null;
  const IDLE_LIMIT = 10 * 60 * 1000;

  function resetIdleTimer() {
    if (!userName) return;
    clearTimeout(idleTimer);
    idleTimer = setTimeout(performIdleLogout, IDLE_LIMIT);
  }

  async function performIdleLogout() {
    if (!userName) return;
    try {
      await fetch(`${STATE_API}?action=logout`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: userName })
      });
    } catch (e) {}
    localLogout("You have been logged out due to 10 minutes of inactivity.");
  }

  function localLogout(message) {
    userName = '';
    sessionStorage.removeItem('connect_user');
    document.getElementById('nameGate').classList.remove('hidden');
    document.getElementById('nameInput').value = '';
    chatHistory = [];
    chatFiles = [];
    renderChatArea();
    if (message) alert(message);
  }

  ['mousemove', 'mousedown', 'click', 'scroll', 'keydown', 'touchstart'].forEach(evt => {
    document.addEventListener(evt, resetIdleTimer, true);
  });

  // Poll server state
  async function pollUserStatus() {
    if (!userName) return;
    try {
      const res = await fetch(`${STATE_API}?action=users&t=${Date.now()}`);
      if (!res.ok) return;
      const data = await res.json();
      if (data && data.users && !data.users[userName]) {
        localLogout("Your session has been ended by the presenter.");
      }
    } catch (e) {}
  }
  setInterval(pollUserStatus, 5000);

  // --- Gen Counter (device-level, persists across refresh/name change) ---
  const GEN_STORAGE_KEY = 'vt_device_gen_count';
  function getGenCount() {
    try { return parseInt(localStorage.getItem(GEN_STORAGE_KEY) || '0', 10); } catch (e) { return 0; }
  }
  function incrementGenCount() {
    try { localStorage.setItem(GEN_STORAGE_KEY, String(getGenCount() + 1)); } catch (e) {}
  }
  function updateGenCounter() {
    const used = getGenCount();
    const remaining = Math.max(0, MAX_GENERATIONS - used);
    const el = document.getElementById('genCounter');
    el.textContent = `${remaining}/${MAX_GENERATIONS} left`;
    if (remaining === 0) {
      el.classList.add('depleted');
      document.getElementById('cLimitBanner').style.display = 'block';
    }
  }

  // Load API key from server (store promise so we can await it before first use)
  const configReady = (async function loadConfig() {
    try {
      const res = await fetch('/api/config');
      const data = await res.json();
      if (data.apiKey) API_KEY = data.apiKey;
    } catch (e) { console.warn('Config load failed:', e); }
  })();

  // Auto-enter if session exists, and block if device limit reached
  (function() {
    // Check device limit immediately
    const deviceUsed = getGenCount();
    if (deviceUsed >= MAX_GENERATIONS) {
      // Show name gate with depleted message
      document.getElementById('genCounter').textContent = '0/3 left';
      document.getElementById('genCounter').classList.add('depleted');
    }

    const saved = sessionStorage.getItem('connect_user');
    if (saved) {
      userName = saved;
      document.getElementById('nameGate').classList.add('hidden');
      document.getElementById('appUser').textContent = saved;
      updateGenCounter();
      resetIdleTimer();
    }
    document.getElementById('nameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') enterApp();
    });
  })();

  // --- Chat File Handling ---
  function handleChatFiles(files) {
    for (const f of files) {
      if (!f.type.startsWith('image/')) continue;
      if (chatFiles.length >= 4) break;
      const reader = new FileReader();
      reader.onload = (e) => {
        const src = e.target.result;
        const base64 = src.split(',')[1];
        const mimeType = src.split(';')[0].split(':')[1];
        const defaultTag = f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ').substring(0, 15);
        chatFiles.push({ src, base64, mimeType, name: f.name, tag: defaultTag });
        renderFilePreview();
      };
      reader.readAsDataURL(f);
    }
    document.getElementById('chatFileInput').value = '';
  }

  function renderFilePreview() {
    const el = document.getElementById('chatFilePreview');
    if (chatFiles.length === 0) { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.style.display = 'flex';
    el.innerHTML = chatFiles.map((f, i) => `
      <div class="chat-file-item">
        <div class="chat-file-thumb">
          <img src="${f.src}" alt="${f.name}">
          <button type="button" onclick="removeChatFile(${i})">✕</button>
        </div>
        <input class="chat-file-tag" type="text" placeholder="tag" value="${f.tag || ''}"
          oninput="chatFiles[${i}].tag=this.value" maxlength="15">
      </div>
    `).join('');
  }

  window.removeChatFile = function(i) {
    chatFiles.splice(i, 1);
    renderFilePreview();
  };

  // --- Render Chat ---
  function renderChatArea() {
    const area = document.getElementById('chatArea');
    if (chatHistory.length === 0) {
      area.innerHTML = `
        <div class="chat-welcome">
          <div class="chat-welcome-emoji">🎬</div>
          <h2>Your AI Storyboard Director</h2>
          <p>Tell me your video idea and upload reference photos. I'll create a visual storyboard for you.</p>
        </div>`;
      return;
    }
    let html = '';
    for (const msg of chatHistory) {
      if (msg.role === 'user') {
        let imgsHtml = '';
        if (msg.images && msg.images.length > 0) {
          imgsHtml = '<div class="chat-images">' + msg.images.map(img => `<img src="${img.src}" alt="ref">`).join('') + '</div>';
        }
        html += `<div class="chat-msg user">${imgsHtml}${escapeHtml(msg.text)}</div>`;
      } else if (msg.storyboardB64) {
        const showBtn = lastStoryboardData && lastStoryboardData.b64 === msg.storyboardB64 && !msg.videoGenerated;
        html += `
          <div class="storyboard-result">
            <div class="sb-label">🎨 Visual Storyboard</div>
            <img src="data:image/png;base64,${msg.storyboardB64}" alt="Storyboard" onclick="openLightbox(this.src)">
            ${showBtn ? '<button class="gen-video-btn" onclick="startVideoGeneration()" id="genVideoBtn">🎬 Generate Video</button>' : ''}
          </div>`;
      } else if (msg.videoSrc) {
        html += `
          <div class="video-result">
            <div class="vr-label">🎬 Generated Video</div>
            <video src="${msg.videoSrc}" controls autoplay loop playsinline></video>
            <button class="vr-download" onclick="downloadVideo('${msg.videoSrc}')">📥 Download Video</button>
          </div>`;
      } else if (msg.videoProgress) {
        html += `
          <div class="video-progress" id="videoProgressEl">
            <div class="vp-status">${msg.videoProgress}</div>
            <div class="vp-bar"><div class="vp-fill" style="width:${msg.progressPct || 10}%"></div></div>
          </div>`;
      } else {
        html += `<div class="chat-msg model"><div class="chat-sender">AI Director</div>${formatModelText(msg.text)}</div>`;
      }
    }
    if (isTyping) {
      html += `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    }
    area.innerHTML = html;
    area.scrollTop = area.scrollHeight;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatModelText(text) {
    return text.replace(/\n/g, '<br>');
  }

  function openLightbox(src) {
    const lb = document.createElement('div');
    lb.className = 'lightbox';
    lb.onclick = () => lb.remove();
    lb.innerHTML = `<img src="${src}">`;
    document.body.appendChild(lb);
  }

  // --- Send Message ---
  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = (input.value || '').trim();
    if (!text && chatFiles.length === 0) return;
    if (isTyping) return;

    const used = getGenCount();
    if (used >= MAX_GENERATIONS) { updateGenCounter(); return; }

    // Build user message
    const userMsg = {
      role: 'user',
      text: text || '[Uploaded reference images]',
      images: chatFiles.map(f => ({ src: f.src, base64: f.base64, mimeType: f.mimeType, tag: f.tag }))
    };
    chatHistory.push(userMsg);

    const currentImages = [...chatFiles];
    chatFiles = [];
    input.value = '';
    input.style.height = 'auto';
    renderFilePreview();
    renderChatArea();

    resetIdleTimer();

    // Go directly to storyboard generation — no conversation
    await generateStoryboard(text, currentImages);
  }

  // --- Generate Visual Storyboard ---
  async function generateStoryboard(userPrompt, refImages) {
    isTyping = true;
    chatHistory.push({ role: 'model', text: '🎨 Creating your visual storyboard...' });
    renderChatArea();

    try {
      const imgParts = [];
      for (const img of refImages) {
        imgParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
      }

      // Also gather any images from previous messages
      for (const msg of chatHistory) {
        if (msg.role === 'user' && msg.images && msg !== chatHistory[chatHistory.length - 2]) {
          for (const img of msg.images) {
            if (img.base64) imgParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
          }
        }
      }

      // Build tag context
      const allImages = chatHistory.filter(m => m.role === 'user' && m.images).flatMap(m => m.images);
      let tagContext = '';
      if (allImages.length > 0) {
        tagContext = `\nVISUAL REFERENCE IMAGES PROVIDED:\n${allImages.map((img, i) => `- Image [${i+1}] tag: "${img.tag}"`).join('\n')}\nCRITICAL: The characters/products must look IDENTICAL to the reference images. Maintain exact face, features, hair, clothing, and body.`;
      }

      // Detect stylized art style
      const allText = chatHistory.filter(m => m.role === 'user').map(m => m.text).join(' ');
      const stylizedKeywords = /\b(anime|sketch|cartoon|comic|manga|illustration|watercolor|pixel\s*art|cel[\s-]?shad|line\s*art|chibi|hand[\s-]?drawn|pencil|ink|paint|2d\s*animation)\b/i;
      const isStylized = stylizedKeywords.test(allText);
      const styleDirective = isStylized
        ? `Use the art style explicitly requested (e.g. anime, sketch, cartoon, etc.) for all panels and character designs.`
        : `MANDATORY VISUAL STYLE: Ultra-realistic, photorealistic, 4K cinematic quality. Every panel must look like a real photograph or high-end film still — NOT a sketch, NOT a cartoon, NOT an illustration.`;

      // Sanitize prompt for image model — replace copyrighted names with generic equivalents
      function sanitizeForImageGen(text) {
        const replacements = [
          [/\bhulk\b/gi, 'a massive green muscular superhero'],
          [/\bspider[\s-]?man\b/gi, 'a masked web-slinging superhero'],
          [/\bbatman\b/gi, 'a dark caped vigilante hero'],
          [/\bsuperman\b/gi, 'a powerful flying caped hero'],
          [/\biron[\s-]?man\b/gi, 'a hero in high-tech red and gold armor'],
          [/\bthor\b/gi, 'a powerful lightning god warrior'],
          [/\bcaptain america\b/gi, 'a shield-wielding patriot hero'],
          [/\bthanos\b/gi, 'a powerful cosmic titan villain'],
          [/\bjoker\b/gi, 'a sinister clown villain'],
          [/\bfighting\b/gi, 'having an epic encounter with'],
          [/\bfight\b/gi, 'epic encounter'],
          [/\battack\b/gi, 'dramatic confrontation'],
          [/\bkill\b/gi, 'defeat'],
          [/\bpunch\b/gi, 'powerful gesture toward'],
        ];
        let result = text;
        for (const [pattern, replacement] of replacements) {
          result = result.replace(pattern, replacement);
        }
        return result;
      }

      const cleanPrompt = sanitizeForImageGen(userPrompt);

      const storyboardPrompt = `Generate a comprehensive visual board and storyboard sheet in 16:9 ratio for this video concept:

"${cleanPrompt}"
${tagContext}

${styleDirective}

The sheet must be styled like a professional production concept art sheet containing:
1. Character Design & Expressions: Model sheets showing the character's face, body, and expressions in different angles — rendered in ${isStylized ? 'the requested art style' : 'ultra-realistic, photorealistic detail (like a real photo)'}.
2. Color Palette & Environment: Swatches and key background landscapes defining the setting — ${isStylized ? 'in the requested style' : 'photorealistic, cinematic, 4K quality'}.
3. Sequential Storyboard Panels: A grid of multiple storyboard frames (minimum 6, labeled Shot 01, Shot 02, etc.) that tell the narrative progression — each panel must be ${isStylized ? 'in the requested art style' : 'ultra-realistic and look like a real movie frame, NOT a drawn sketch'}.

CRITICAL REQUIREMENT: If reference images are provided, the character in the visual board must look identical to the person in the reference images (matching their exact face, body, hair, and clothing style).
Do NOT include any copyrighted characters, brand logos, or trademarked content. Create original character designs inspired by the user's description.`;

      // Try up to 2 attempts
      let imgB64 = null;
      for (let attempt = 1; attempt <= 2; attempt++) {
        const requestParts = attempt === 1
          ? [...imgParts, { text: storyboardPrompt }]
          : [...imgParts, { text: `Generate a creative visual storyboard sheet in 16:9 ratio with character designs and 6 sequential panels for this concept: "${cleanPrompt}". Use original character designs inspired by the description. ${isStylized ? '' : 'Ultra-realistic photorealistic style.'} Do NOT use any copyrighted characters or brand names.` }];

        try {
          const fRes = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:generateContent?key=${API_KEY}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: requestParts }],
                generationConfig: { responseModalities: ["TEXT", "IMAGE"], temperature: 1.0 }
              })
            }
          );
          const fData = await fRes.json();
          if (fData.error) {
            console.warn(`Storyboard attempt ${attempt} error:`, fData.error.message);
            if (attempt === 2) throw new Error(fData.error.message);
            continue;
          }

          const resParts = fData.candidates?.[0]?.content?.parts || [];
          for (const p of resParts) {
            if (p.inlineData && p.inlineData.mimeType.startsWith('image/')) {
              imgB64 = p.inlineData.data;
              break;
            }
          }
          if (imgB64) break;

          if (attempt === 1) {
            console.warn('Attempt 1 returned no image — retrying with simplified prompt...');
          }
        } catch (attemptErr) {
          console.warn(`Storyboard attempt ${attempt} failed:`, attemptErr);
          if (attempt === 2) throw attemptErr;
        }
      }

      if (!imgB64) throw new Error("No storyboard image returned after 2 attempts.");

      // Remove the "Creating..." message
      chatHistory = chatHistory.filter(m => m.text !== '🎨 Creating your visual storyboard...');

      // Add storyboard as a special message
      // Save storyboard data for video generation
      lastStoryboardData = { b64: imgB64, userPrompt, refImages };

      chatHistory.push({ role: 'model', storyboardB64: imgB64, text: '' });

    } catch (e) {
      chatHistory = chatHistory.filter(m => m.text !== '🎨 Creating your visual storyboard...');
      chatHistory.push({ role: 'model', text: `⚠️ Storyboard generation failed: ${e.message}. Try again!` });
    }

    isTyping = false;
    renderChatArea();
  }

  // --- Generate Video from Storyboard (Gemini Omni Flash — 20s = 2×10s) ---

  // Helper: extract base64 from Omni response
  function extractVideoB64(omniData) {
    let videoB64 = omniData.output_video?.data || null;
    const steps = omniData.steps || [];
    for (const step of steps) {
      if (step.content) {
        const contentList = Array.isArray(step.content) ? step.content : [step.content];
        for (const content of contentList) {
          const partsList = content.parts || [content];
          for (const part of partsList) {
            if (part.data) { videoB64 = part.data; break; }
            if (part.inlineData?.data) { videoB64 = part.inlineData.data; break; }
          }
          if (videoB64) break;
        }
      }
      if (videoB64) break;
    }
    return videoB64;
  }

  // Helper: extract last frame from video as base64 PNG
  function extractLastFrame(videoB64) {
    return new Promise((resolve, reject) => {
      const video = document.createElement('video');
      video.muted = true;
      video.playsInline = true;
      video.preload = 'auto';
      video.src = `data:video/mp4;base64,${videoB64}`;

      video.onloadedmetadata = () => {
        // Seek to near the end (last 0.1s)
        video.currentTime = Math.max(0, video.duration - 0.1);
      };

      video.onseeked = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0);
          const dataUrl = canvas.toDataURL('image/png');
          const b64 = dataUrl.split(',')[1];
          video.src = ''; // Release memory
          resolve(b64);
        } catch (e) {
          reject(e);
        }
      };

      video.onerror = () => reject(new Error('Failed to load video for frame extraction'));
      setTimeout(() => reject(new Error('Frame extraction timeout')), 15000);
    });
  }

  // Helper: call Omni Flash
  async function callOmniFlash(inputParts, duration = '10s') {
    const requestBody = {
      model: 'gemini-omni-flash-preview',
      input: inputParts,
      response_format: { type: 'video', aspect_ratio: '9:16', duration }
    };
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/interactions?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const b64 = extractVideoB64(data);
    if (!b64) throw new Error('No video returned from Omni Flash.');
    return b64;
  }

  async function startVideoGeneration() {
    if (!lastStoryboardData) return;
    const btn = document.getElementById('genVideoBtn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Starting...'; }

    const { b64: storyboardB64, userPrompt, refImages } = lastStoryboardData;

    // Mark storyboard as used
    for (const msg of chatHistory) {
      if (msg.storyboardB64 === storyboardB64) msg.videoGenerated = true;
    }

    const progressMsg = { role: 'model', videoProgress: '⏳ Step 1/4: AI Director planning 20s film...', progressPct: 10 };
    chatHistory.push(progressMsg);
    renderChatArea();

    try {
      // === Step 1: Synthesize TWO prompts (clip 1 = 0–10s, clip 2 = 10–20s) ===
      let promptClip1 = userPrompt;
      let promptClip2 = userPrompt;

      try {
        const synthParts = [];
        for (const img of refImages) {
          synthParts.push({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
        }
        synthParts.push({ inlineData: { mimeType: 'image/png', data: storyboardB64 } });
        synthParts.push({
          text: `You are an expert AI video director. We are generating a 20-second video in TWO sequential 10-second clips using Gemini Omni Flash.

INPUTS:
1. Reference photos (uploaded by user) — use for exact character appearance
2. Visual Board & Storyboard Sheet with character designs, expressions, and sequential panels

USER'S PROMPT: "${userPrompt}"

TASK: Analyze the storyboard panels and reference photos. Write TWO separate cinematic video prompts:

CLIP 1 (0–10s): Covers the FIRST HALF of the storyboard — the setup, opening shots, and initial action. Must end on a clear, holdable moment that the next clip can seamlessly continue from.

CLIP 2 (10–20s): Covers the SECOND HALF of the storyboard — the climax, resolution, and closing shots. Must begin exactly where Clip 1 ended, maintaining the same character positions, camera angle, lighting, and environment.

RULES:
- Each prompt is ONE continuous paragraph — no timestamps, no scene labels
- Maintain exact character identity from reference photos in both clips
- Describe camera movements, lens actions, lighting, action beats
- Do NOT include any text overlays, subtitles, watermarks
- The transition between clips must be seamless — same scene, same moment

Output EXACTLY in this format (no extra text):
CLIP1: [prompt text]
CLIP2: [prompt text]`
        });

        const synthRes = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${SYNTH_MODEL}:generateContent?key=${API_KEY}`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: synthParts }] }) }
        );
        const synthData = await synthRes.json();
        const synthText = synthData.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';

        const clip1Match = synthText.match(/CLIP1:\s*([\s\S]*?)(?=CLIP2:|$)/i);
        const clip2Match = synthText.match(/CLIP2:\s*([\s\S]*?)$/i);
        if (clip1Match?.[1]?.trim()) promptClip1 = clip1Match[1].trim();
        if (clip2Match?.[1]?.trim()) promptClip2 = clip2Match[1].trim();
      } catch (synthErr) {
        console.warn('Synthesis failed, using original prompt for both clips:', synthErr);
      }

      const qualityGuard = ' Maintain temporal consistency. Zero erratic camera shaking. Anatomically correct humans. Smooth natural motion. Stable consistent face identity throughout. Cinematic motion blur, natural depth of field. Do NOT include any text overlays, subtitles, watermarks, or written words.';
      promptClip1 += qualityGuard;
      promptClip2 += qualityGuard;

      // === Step 2: Generate Clip 1 (0–10s) ===
      progressMsg.videoProgress = '⏳ Step 2/4: Generating Clip 1 (0–10s)...';
      progressMsg.progressPct = 25;
      renderChatArea();

      let elapsed = 0;
      const interval1 = setInterval(() => {
        elapsed += 3;
        progressMsg.videoProgress = `⏳ Step 2/4: Clip 1 rendering... (${elapsed}s)`;
        progressMsg.progressPct = Math.min(45, 25 + (elapsed / 120) * 20);
        renderChatArea();
      }, 3000);

      const inputParts1 = [];
      for (const img of refImages) {
        inputParts1.push({ type: 'image', data: img.base64, mime_type: img.mimeType });
      }
      inputParts1.push({ type: 'image', data: storyboardB64, mime_type: 'image/png' });
      inputParts1.push({ type: 'text', text: promptClip1 });

      const clip1B64 = await callOmniFlash(inputParts1, '10s');
      clearInterval(interval1);

      // === Step 3: Extract last frame from Clip 1 ===
      progressMsg.videoProgress = '⏳ Step 3/4: Extracting continuity frame...';
      progressMsg.progressPct = 50;
      renderChatArea();

      let lastFrameB64;
      try {
        lastFrameB64 = await extractLastFrame(clip1B64);
      } catch (frameErr) {
        console.warn('Frame extraction failed:', frameErr);
        lastFrameB64 = null;
      }

      // === Step 4: Generate Clip 2 (10–20s) with last frame as first frame ===
      progressMsg.videoProgress = '⏳ Step 3/4: Generating Clip 2 (10–20s)...';
      progressMsg.progressPct = 55;
      renderChatArea();

      let elapsed2 = 0;
      const interval2 = setInterval(() => {
        elapsed2 += 3;
        progressMsg.videoProgress = `⏳ Step 3/4: Clip 2 rendering... (${elapsed2}s)`;
        progressMsg.progressPct = Math.min(75, 55 + (elapsed2 / 120) * 20);
        renderChatArea();
      }, 3000);

      const inputParts2 = [];
      // Add last frame as the FIRST reference so Omni starts from it
      if (lastFrameB64) {
        inputParts2.push({ type: 'image', data: lastFrameB64, mime_type: 'image/png' });
      }
      for (const img of refImages) {
        inputParts2.push({ type: 'image', data: img.base64, mime_type: img.mimeType });
      }
      inputParts2.push({ type: 'image', data: storyboardB64, mime_type: 'image/png' });

      const continuityPrefix = lastFrameB64
        ? 'CONTINUITY LOCK: The attached first image is the EXACT last frame of the previous clip. You MUST start this clip from this EXACT frame — same character positions, same camera angle, same lighting, same environment. Begin from this frozen moment and seamlessly continue the action. '
        : '';
      inputParts2.push({ type: 'text', text: continuityPrefix + promptClip2 });

      const clip2B64 = await callOmniFlash(inputParts2, '10s');
      clearInterval(interval2);

      // === Step 5: Package both clips for seamless playback ===
      progressMsg.videoProgress = '⏳ Step 4/4: Preparing your 20s film...';
      progressMsg.progressPct = 95;
      renderChatArea();

      const videoClip1 = `data:video/mp4;base64,${clip1B64}`;
      const videoClip2 = `data:video/mp4;base64,${clip2B64}`;

      // === Done — show seamless dual-clip player ===
      chatHistory = chatHistory.filter(m => m !== progressMsg);
      chatHistory.push({ role: 'model', videoClips: [videoClip1, videoClip2], text: '' });
      chatHistory.push({ role: 'model', text: '🎬 Your 20-second film is ready! Download it or send another idea.' });

      incrementGenCount();
      updateGenCounter();

      // Save to shared library
      try {
        await fetch(`${STATE_API}?action=video`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user: userName, prompt: userPrompt, uri: typeof videoSrc === 'string' && videoSrc.startsWith('http') ? videoSrc : null, aspectRatio: '9:16' })
        });
      } catch (e) {}

    } catch (e) {
      chatHistory = chatHistory.filter(m => m !== progressMsg);
      chatHistory.push({ role: 'model', text: `⚠️ Video generation failed: ${e.message}` });
    }

    lastStoryboardData = null;
    renderChatArea();
  }

  // Download helper
  window.downloadVideo = async function(src) {
    try {
      const res = await fetch(src);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `vibetheory-video-${Date.now()}.mp4`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch (e) {
      alert('Download failed: ' + e.message);
    }
  };

</script>
